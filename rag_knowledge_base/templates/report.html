{% extends "layout.html" %}

{% block content %}

<div class="container-fluid">
    <div class="row">
        <!-- 主內容區 -->
        <main class="col-md-10 ml-sm-auto px-4">
            <h2 class="mt-4 mb-3">錯題統計報告</h2>

            <div class="card mb-4">
                <div class="card-body">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>題目</th>
                                <th>錯誤次數</th>
                                <th>來源</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for item in report_data %}
                            <tr>
                                <td>{{ item.question_text }}</td>
                                <td>{{ item.error_count }}</td>
                                <td>{{ item.source }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

{% endblock %}
